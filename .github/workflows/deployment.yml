name: Build And Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SPC.KeyVault.csproj

      - name: Build
        run: dotnet build SPC.KeyVault.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish SPC.KeyVault.csproj --configuration Release --no-build --output ./publish

      - name: Archive publish output
        run: |
          cd publish
          zip -r "../SPC.KeyVault-${{ github.ref_name || github.sha }}.zip" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPC.KeyVault-${{ github.ref_name || github.sha }}
          path: SPC.KeyVault-${{ github.ref_name || github.sha }}.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "SPC.KeyVault-${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes
