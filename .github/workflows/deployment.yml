name: Build And Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve artifact name
        id: names
        run: |
          echo "artifact_name=SPC.KeyVault-${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore SPC.KeyVault.csproj

      - name: Build
        run: dotnet build SPC.KeyVault.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish SPC.KeyVault.csproj --configuration Release --no-build --output ./publish

      - name: Archive publish output
        run: |
          cd publish
          zip -r "../${{ steps.names.outputs.artifact_name }}.zip" .

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.release_tag }}" \
            "${{ steps.names.outputs.artifact_name }}.zip" \
            --title "${{ inputs.release_tag }}" \
            --generate-notes \
            --target "${{ github.sha }}"
